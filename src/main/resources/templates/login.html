<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>InterviewReady — Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0; padding: 2rem;
        }
        .container {
            width: 100%; max-width: 420px;
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 20px; padding: 2.5rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 {
            font-size: 1.75rem; font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo p { color: #94a3b8; font-size: 0.875rem; margin-top: 0.25rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block; font-size: 0.8rem; font-weight: 500;
            color: #94a3b8; margin-bottom: 0.35rem;
        }
        .form-group input {
            width: 100%; padding: 0.7rem 0.9rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 10px; color: #e2e8f0;
            font-size: 0.9rem; font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none; border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }
        .btn-primary {
            width: 100%; padding: 0.8rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border: none; border-radius: 10px; color: #fff;
            font-size: 0.95rem; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .divider {
            display: flex; align-items: center; gap: 0.75rem;
            margin: 1.25rem 0; color: #475569; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(148, 163, 184, 0.12);
        }
        .btn-google {
            width: 100%; padding: 0.75rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 10px; color: #e2e8f0;
            font-size: 0.9rem; font-weight: 500;
            font-family: 'Inter', sans-serif; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            gap: 0.6rem; transition: border-color 0.2s; text-decoration: none;
        }
        .btn-google:hover { border-color: #38bdf8; background: rgba(56, 189, 248, 0.05); }
        .btn-google svg { width: 20px; height: 20px; }
        .signup-link {
            text-align: center; margin-top: 1.5rem;
            font-size: 0.85rem; color: #94a3b8;
        }
        .signup-link a { color: #38bdf8; text-decoration: none; font-weight: 500; }
        .signup-link a:hover { text-decoration: underline; }
        .msg-success {
            background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80; padding: 0.6rem; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 1rem;
        }
        .msg-error {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171; padding: 0.6rem; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 1rem;
        }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 0.4rem; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>InterviewReady</h1>
        <p>Welcome back</p>
    </div>

    <div th:if="${success}" class="msg-success" th:text="${success}"></div>
    <div th:if="${error}" class="msg-error" th:text="${error}"></div>

    <form id="loginForm" th:action="@{/login-page}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="john_doe"/>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••"/>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Log In</button>
    </form>

    <div class="divider">or</div>

    <a href="/oauth2/authorization/google" class="btn-google">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
    </a>

    <div class="signup-link">
        Don't have an account? <a href="/signup">Sign up</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function() {
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Logging in...';
    });
</script>
</body>
</html>
