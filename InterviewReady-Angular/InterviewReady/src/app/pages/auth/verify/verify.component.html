<!-- Mesh gradient background -->
<div class="mesh-bg">
  <div class="mesh-orb mesh-orb-1"></div>
  <div class="mesh-orb mesh-orb-2"></div>
  <div class="mesh-orb mesh-orb-3"></div>
</div>

<div class="auth-container" style="text-align: center;">
  <div class="gradient-accent"></div>

  <div class="logo-header">
    <img src="/assets/IR_logo.svg" alt="InterviewReady" class="logo-mark" />
    <h1>InterviewReady</h1>
    <p>Check your inbox</p>
  </div>

  <div class="icon-circle">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </svg>
  </div>

  <div class="email-display">{{ email }}</div>

  @if (success()) {
    <div class="msg-success">{{ success() }}</div>
  }
  @if (error()) {
    <div class="msg-error">{{ error() }}</div>
  }

  <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()" id="verifyForm">

    <div class="form-group" style="text-align: left;">
      <label for="verify-code">Verification Code</label>
      <input type="text"
             id="verify-code"
             formControlName="code"
             class="code-input"
             maxlength="6"
             placeholder="------"
             autocomplete="one-time-code"
             inputmode="numeric" />
      @if (verifyForm.get('code')?.invalid && verifyForm.get('code')?.touched) {
        <span class="field-error">Enter a valid 6-digit code</span>
      }
    </div>

    <div class="btn-primary-wrap">
      <button type="submit"
              class="btn-primary-inner"
              id="verifyBtn"
              [disabled]="verifyForm.invalid || isLoading()">
        @if (isLoading()) {
          <span class="spinner"></span> Verifying...
        } @else {
          Verify Email
        }
      </button>
    </div>
  </form>

  <div class="auth-link">
    Didn't receive it? <a routerLink="/auth/signup">Go back &amp; resend</a>
  </div>
</div>
