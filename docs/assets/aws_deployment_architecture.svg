<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-blue" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Grid -->
    <pattern id="diag-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap');
    
    svg {
      background-color: #0b0f19;
      font-family: 'Outfit', sans-serif;
    }

    rect, circle, path, text {
      box-sizing: border-box;
    }
    
    .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      fill: #ffffff;
    }
    
    .label {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      fill: #e2e8f0;
    }
    
    .mono-sub {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      fill: #94a3b8;
    }
    
    .meta-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      fill: #64748b;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.3; }
      100% { opacity: 0.6; }
    }

    .pulse-glow {
      animation: pulseGlow 3s ease-in-out infinite alternate;
    }
    
    @keyframes flowLine {
      to {
        stroke-dashoffset: -40;
      }
    }
    
    .flow-path {
      stroke-dasharray: 8, 12;
      animation: flowLine 2s linear infinite;
    }
  </style>

  <!-- Grid Background -->
  <rect width="100%" height="100%" fill="url(#diag-grid)" />

  <!-- Title Header -->
  <text x="50" y="45" class="title" font-size="18" fill="#ffffff">AWS CLOUD PRODUCTION INFRASTRUCTURE</text>
  <text x="50" y="65" class="mono-sub" font-size="10" fill="#3b82f6">Secure VPC Network &amp; Managed Multi-Subnet Services</text>
  
  <!-- Outer VPC Container -->
  <rect x="200" y="90" width="760" height="420" rx="16" fill="rgba(30, 41, 59, 0.2)" stroke="rgba(59, 130, 246, 0.3)" stroke-width="2" />
  <rect x="200" y="90" width="760" height="420" rx="16" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.1" filter="url(#glow-blue)" class="pulse-glow" />
  <text x="220" y="115" class="mono-sub" font-size="10" font-weight="700">AWS VPC (10.0.0.0/16)</text>

  <!-- Internet Gateway Connector -->
  <path d="M 120,285 H 200" stroke="#3b82f6" stroke-width="2" class="flow-path" fill="none" />
  
  <!-- ================= 1. PUBLIC SUBNET (ALB & Gateway) ================= -->
  <rect x="220" y="130" width="160" height="350" rx="12" fill="rgba(15, 23, 42, 0.6)" stroke="rgba(255,255,255,0.03)" stroke-width="1.5" />
  <text x="235" y="155" class="label" font-size="10" fill="#fbbf24">Public Subnet (ALB)</text>
  <text x="235" y="168" class="mono-sub" font-size="8" fill="#f59e0b">CIDR: 10.0.1.0/24</text>
  
  <!-- ALB Node -->
  <g transform="translate(235, 240)">
    <rect width="130" height="90" rx="8" fill="rgba(59, 130, 246, 0.05)" stroke="url(#primary-grad)" stroke-width="1.5" />
    <text x="65" y="32" class="title" font-size="12" text-anchor="middle">Application</text>
    <text x="65" y="46" class="title" font-size="12" text-anchor="middle">Load Balancer</text>
    <text x="65" y="66" class="mono-sub" font-size="8" fill="#3b82f6" text-anchor="middle">HTTPS Ports 443</text>
  </g>

  <!-- Connectors from ALB to Private Subnet -->
  <path d="M 365,285 H 430" stroke="#8b5cf6" stroke-width="2" class="flow-path" fill="none" />

  <!-- ================= 2. PRIVATE SUBNETS ================= -->
  <rect x="410" y="130" width="530" height="350" rx="12" fill="rgba(15, 23, 42, 0.8)" stroke="rgba(255,255,255,0.02)" stroke-width="1.5" stroke-dasharray="4,4" />
  <text x="425" y="155" class="label" font-size="10" fill="#a78bfa">Private App &amp; Data Subnets</text>
  <text x="425" y="168" class="mono-sub" font-size="8" fill="#8b5cf6">CIDR: 10.0.2.0/24 &amp; 10.0.3.0/24</text>

  <!-- ECS Task Fargate: Angular Frontend -->
  <g transform="translate(430, 210)">
    <rect width="130" height="70" rx="8" fill="rgba(139, 92, 246, 0.04)" stroke="url(#purple-grad)" stroke-width="1.5" />
    <text x="65" y="26" class="title" font-size="11" text-anchor="middle">Angular SSR Task</text>
    <text x="65" y="42" class="mono-sub" font-size="8" text-anchor="middle">AWS ECS Fargate</text>
    <text x="65" y="54" class="meta-text" font-size="8" text-anchor="middle">Port 4000 (Local)</text>
  </g>

  <!-- ECS Task Fargate: Spring Boot Backend -->
  <g transform="translate(430, 310)">
    <rect width="130" height="70" rx="8" fill="rgba(139, 92, 246, 0.04)" stroke="url(#purple-grad)" stroke-width="1.5" />
    <text x="65" y="26" class="title" font-size="11" text-anchor="middle">Spring Boot API Task</text>
    <text x="65" y="42" class="mono-sub" font-size="8" text-anchor="middle">AWS ECS Fargate</text>
    <text x="65" y="54" class="meta-text" font-size="8" text-anchor="middle">Port 8080 (Local)</text>
  </g>

  <!-- Private Inter-Connectors -->
  <!-- ECS Backend to RDS -->
  <path d="M 560,345 Q 600,345 615,260" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />
  <!-- ECS Backend to Redis -->
  <path d="M 560,345 Q 600,345 615,385" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />
  <!-- ECS Backend to GPU EC2 -->
  <path d="M 560,345 H 770" stroke="#8b5cf6" stroke-width="2" class="flow-path" fill="none" />

  <!-- Amazon RDS PostgreSQL Database -->
  <g transform="translate(610, 210)">
    <rect width="130" height="70" rx="8" fill="rgba(236, 72, 153, 0.04)" stroke="url(#pink-grad)" stroke-width="1.5" />
    <text x="65" y="26" class="title" font-size="11" text-anchor="middle">Amazon RDS</text>
    <text x="65" y="42" class="mono-sub" font-size="8" text-anchor="middle">PostgreSQL Database</text>
    <text x="65" y="54" class="meta-text" font-size="8" fill="#f472b6" font-weight="700" text-anchor="middle">Port 5432</text>
  </g>

  <!-- Amazon ElastiCache Redis Cluster -->
  <g transform="translate(610, 350)">
    <rect width="130" height="70" rx="8" fill="rgba(16, 185, 129, 0.04)" stroke="#10b981" stroke-width="1.5" />
    <text x="65" y="26" class="title" font-size="11" text-anchor="middle">ElastiCache Redis</text>
    <text x="65" y="42" class="mono-sub" font-size="8" text-anchor="middle">Session &amp; Token Store</text>
    <text x="65" y="54" class="meta-text" font-size="8" fill="#34d399" font-weight="700" text-anchor="middle">Port 6379</text>
  </g>

  <!-- Amazon EC2 GPU Instance (Llama 3.1 Model) -->
  <g transform="translate(780, 275)">
    <rect width="140" height="90" rx="8" fill="rgba(139, 92, 246, 0.04)" stroke="url(#purple-grad)" stroke-width="1.5" />
    <rect width="140" height="90" rx="8" fill="none" stroke="#c084fc" stroke-width="1" stroke-opacity="0.3" filter="url(#glow-blue)" />
    <text x="70" y="28" class="title" font-size="12" text-anchor="middle">Amazon EC2 GPU</text>
    <text x="70" y="46" class="mono-sub" font-size="8" text-anchor="middle">g5.xlarge Instance</text>
    <text x="70" y="58" class="mono-sub" font-size="8" text-anchor="middle">Llama 3.1 8B Instruct</text>
    <text x="70" y="76" class="meta-text" font-size="8" fill="#8b5cf6" font-weight="700" text-anchor="middle">REST QLoRA Model</text>
  </g>

  <!-- ================= CLIENT DEVICES ================= -->
  <g transform="translate(40, 245)">
    <rect width="80" height="80" rx="40" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
    <!-- Client Icon Graphic -->
    <path d="M 30,35 H 50 M 40,25 V 45" stroke="#3b82f6" stroke-width="2" fill="none" />
    <rect x="25" y="45" width="30" height="20" rx="3" fill="none" stroke="#3b82f6" stroke-width="2" />
    <text x="40" y="76" class="label" font-size="10" text-anchor="middle">CLIENTS</text>
  </g>
</svg>
